<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic 6 - Mirror Master</title>
    <style>
        :root {
            --primary-blue: #3498db;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
        }

        body {
            margin: 0;
            margin-top: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('asset/Basic 6 final.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            width: 450px;
            height: 600px;
            background: rgba(0, 0, 0, 0.4);
            position: relative;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
        }

        #ui-layer {
            margin-top: 80px; 
            width: 80%;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .question-text { font-weight: bold; font-size: 1rem; margin-bottom: 15px; line-height: 1.4; color: #2c3e50; }
        .options { display: grid; gap: 10px; }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: var(--primary-blue);
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        button:hover { filter: brightness(1.1); }
        img{float: left;}
        #stats { position: absolute; top: 10px; right: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <img src="asset/photo_2026-02-10_07-43-14-removebg-preview.png" alt="logo" height="50">
        <h1>Mirror Master</h1>
        <p>B6.3.3.6.1 Reflection of 2D Shapes</p>
        <div id="stats">Score: <span id="score">0</span>/10</div>
        <div id="game-box">
            <p class="question-text" id="question">Loading challenge...</p>
            <div class="options" id="options"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    const questions = [
        { q: "If a shape is 3 units to the left of a mirror line, where is its reflection?", a: ["3 units to the right", "6 units to the left", "3 units up"], c: 0 },
        { q: "Does a reflection change the size of a shape?", a: ["Yes, it gets bigger", "No, it stays the same", "Yes, it gets smaller"], c: 1 },
        { q: "When you reflect an 'L' shape across a vertical line, it looks...", a: ["Upside down", "Backwards", "The same"], c: 1 },
        { q: "What is the line that a shape flips over called?", a: ["The Border", "The Mirror Line", "The Shadow"], c: 1 },
        { q: "If the point (2, 4) is reflected over the x-axis, what happens to the '4'?", a: ["Stays 4", "Becomes -4", "Becomes 2"], c: 1 },
        { q: "A reflection is often called a...", a: ["Slide", "Flip", "Turn"], c: 1 },
        { q: "True or False: The distance from the mirror to the shape is the same as the mirror to the image.", a: ["True", "False"], c: 0 },
        { q: "If you reflect a shape across a horizontal line, it moves...", a: ["Side to side", "Up or Down", "Diagonal"], c: 1 },
        { q: "What happens to the perimeter of a shape after reflection?", a: ["It doubles", "It stays the same", "It disappears"], c: 1 },
        { q: "Which of these is NOT a reflection?", a: ["Seeing your face in a lake", "A car sliding down a road", "Looking in a bathroom mirror"], c: 1 }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        if (currentIdx >= questions.length) {
            document.getElementById('game-box').innerHTML = `<h2>Mirror Expert!</h2><p>You scored ${score}/10</p>`;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            return;
        }
        const item = questions[currentIdx];
        document.getElementById('question').innerText = item.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        item.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => {
                if (i === item.c) { score++; document.getElementById('score').innerText = score; }
                currentIdx++;
                loadQuestion();
            };
            optionsDiv.appendChild(btn);
        });
    }

    loadQuestion();
</script>

</body>
</html>
